<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuneFlow</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">TuneFlow</span>
    </div>

    <nav class="nav">
      <a href="#" class="nav-item active"><i class="fas fa-house"></i> Home</a>
      <a href="#" class="nav-item"><i class="fas fa-search"></i> Search</a>
      <a href="#" class="nav-item"><i class="fas fa-layer-group"></i> Library</a>
    </nav>

    <div class="sidebar-section">
      <h4>PLAYLISTS</h4>
      <ul class="playlist-list" id="playlistList">
        <li class="playlist-item active" data-playlist="0">🔥 Hot Right Now</li>
        <li class="playlist-item" data-playlist="1">🌙 Late Night Vibes</li>
        <li class="playlist-item" data-playlist="2">⚡ Energy Boost</li>
        <li class="playlist-item" data-playlist="3">🌊 Chill Wave</li>
      </ul>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <header class="topbar">
      <div class="topbar-left">
        <button class="nav-btn"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search songs, artists..." id="searchInput"/>
      </div>
      <div class="user-area">
        <button class="user-btn"><i class="fas fa-user"></i> Profile</button>
      </div>
    </header>

    <!-- FEATURED BANNER -->
    <section class="banner" id="banner">
      <div class="banner-content">
        <p class="banner-tag">NOW PLAYING</p>
        <h1 class="banner-title" id="bannerTitle">Hot Right Now</h1>
        <p class="banner-sub" id="bannerSub">4 songs • Mixed Artists</p>
        <button class="banner-btn" onclick="playAll()"><i class="fas fa-play"></i> Play All</button>
      </div>
      <div class="banner-art" id="bannerArt">
        <div class="vinyl-disc" id="vinylDisc">
          <div class="vinyl-inner">◈</div>
        </div>
      </div>
    </section>

    <!-- SONG GRID -->
    <section class="section">
      <h2 class="section-title">Tracklist</h2>
      <div class="song-list" id="songList"></div>
    </section>

    <!-- RECENTLY PLAYED -->
    <section class="section">
      <h2 class="section-title">Playlists</h2>
      <div class="playlist-cards" id="playlistCards"></div>
    </section>

  </main>

  <!-- PLAYER BAR -->
  <footer class="player">
    <div class="player-info">
      <div class="player-cover" id="playerCover">
        <i class="fas fa-music"></i>
      </div>
      <div class="player-meta">
        <p class="player-title" id="playerTitle">Select a song</p>
        <p class="player-artist" id="playerArtist">—</p>
      </div>
      <button class="heart-btn" id="heartBtn" onclick="toggleLike()"><i class="far fa-heart"></i></button>
    </div>

    <div class="player-controls">
      <div class="control-btns">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()"><i class="fas fa-shuffle"></i></button>
        <button class="ctrl-btn" onclick="prevSong()"><i class="fas fa-backward-step"></i></button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
        <button class="ctrl-btn" onclick="nextSong()"><i class="fas fa-forward-step"></i></button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()"><i class="fas fa-repeat"></i></button>
      </div>
      <div class="progress-area">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time" id="totalTime">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button class="ctrl-btn"><i class="fas fa-list"></i></button>
      <i class="fas fa-volume-high vol-icon"></i>
      <div class="volume-bar" id="volumeBar" onclick="setVolume(event)">
        <div class="volume-fill" id="volumeFill" style="width:80%"></div>
      </div>
    </div>

    <audio id="audioPlayer"></audio>
  </footer>

  <script src="app.js"></script>
</body>
</html>
